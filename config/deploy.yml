# Name of your application. Used to uniquely configure containers.
service: ei_point_of_sale

# Name of the container image.
# Update to your registry path, e.g. ghcr.io/your-user/ei_point_of_sale
image: ei_point_of_sale

# Deploy to these servers.
servers:
  web:
    - YOUR_SERVER_IP  # Replace with your server's IP address

# Enable SSL auto certification via Let's Encrypt and allow for multiple apps on a single web server.
# If used with Cloudflare, set encryption mode in SSL/TLS setting to "Full" to enable CF-to-app encryption.
#
# Using an SSL proxy like this requires turning on config.assume_ssl and config.force_ssl in production.rb!
#
# proxy:
#   ssl: true
#   host: app.example.com

# Where you keep your container images.
registry:
  # Update to your registry. Examples:
  #   ghcr.io / registry.digitalocean.com / hub.docker.com
  server: localhost:5555

  # Needed for authenticated registries.
  # username: your-user

  # Always use an access token rather than real password when possible.
  # password:
  #   - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL           # postgres://postgres:<password>@ei_point_of_sale-db-1:5432/ei_point_of_sale_production
    - DATABASE_PASSWORD      # Same password used by cache/queue/cable databases
    - GARAGE_ACCESS_KEY
    - GARAGE_SECRET_KEY
  clear:
    # Run Solid Queue inside Puma (no separate worker process needed).
    SOLID_QUEUE_IN_PUMA: true

    # Database connection for cache/queue/cable databases (all on the same postgres accessory).
    # The container name ei_point_of_sale-db-1 is the Kamal internal hostname for the db accessory.
    DATABASE_HOST: ei_point_of_sale-db-1
    DATABASE_USERNAME: postgres

    # Garage S3 endpoint (internal Docker network address of the garage accessory).
    GARAGE_ENDPOINT: "http://ei_point_of_sale-garage-1:3900"

    # Use Garage for Active Storage (set ACTIVE_STORAGE_SERVICE=railway on Railway).
    ACTIVE_STORAGE_SERVICE: garage

    # Set number of cores available to the application on each server (default: 1).
    # WEB_CONCURRENCY: 2

    # Set number of processes dedicated to Solid Queue (default: 1).
    # JOB_CONCURRENCY: 3

    # Log level
    # RAILS_LOG_LEVEL: debug

# Aliases are triggered with "bin/kamal <alias>".
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Persistent storage volume for Active Storage files.
volumes:
  - "ei_point_of_sale_storage:/rails/storage"

# Bridge fingerprinted assets between versions to avoid 404s on in-flight requests.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: amd64

  # Build image via remote server (useful for faster amd64 builds on arm64 computers).
  # remote: ssh://docker@docker-builder-server

# Accessory services.
accessories:
  db:
    image: postgres:18
    host: YOUR_SERVER_IP  # Replace with your server's IP address
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: postgres
        POSTGRES_DB: ei_point_of_sale_production
      secret:
        - POSTGRES_PASSWORD
    files:
      # Init script creates the cache, queue, and cable databases on first boot.
      - config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    directories:
      - data:/var/lib/postgresql/data

  garage:
    image: dxflrs/garage:v2.2.0
    host: YOUR_SERVER_IP  # Replace with your server's IP address
    port:
      - "3900:3900"   # S3 API — must be publicly accessible for presigned URLs
      - "127.0.0.1:3901:3901"  # RPC (internal only)
      - "127.0.0.1:3903:3903"  # Admin API (internal only)
    files:
      - config/garage/garage.toml:/etc/garage.toml
    directories:
      - meta:/var/lib/garage/meta
      - data:/var/lib/garage/data
